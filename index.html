<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparativos Antes y Después | Mantua Decoración</title>

<style>
:root{
  --bg:#f7f7f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --accent:#9f1239;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:22px;
}

*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  width:min(1280px, 92%);
  margin:auto;
}

header{
  text-align:center;
  padding:40px 0 20px;
}

h1{
  margin:0;
  font-size:clamp(2rem,4vw,3rem);
}

.sub{
  color:var(--muted);
  margin-top:10px;
}

.status{
  margin:20px 0;
  padding:16px;
  border-radius:14px;
  background:#fff;
  border:1px solid var(--line);
}

.status.ok{
  background:#f0fdf4;
  border-color:#bbf7d0;
  color:#166534;
}

.status.error{
  background:#fef2f2;
  border-color:#fecaca;
  color:#991b1b;
}

.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.chip{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  text-decoration:none;
  font-weight:700;
  color:var(--text);
}

.category-block{
  margin:40px 0;
}

.category-title{
  font-size:1.6rem;
  margin-bottom:15px;
  text-transform:capitalize;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  gap:22px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.viewer{
  position:relative;
  width:100%;
  aspect-ratio:16/10;
  overflow:hidden;
  background:#e5e7eb;
  cursor:ew-resize;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  -webkit-touch-callout:none;
}

.before-layer,
.after-layer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.viewer img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
  user-select:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  -webkit-user-drag:none;
  -webkit-touch-callout:none;
}

.after-layer{
  z-index:2;
  clip-path:inset(0 0 0 50%);
}

.divider{
  position:absolute;
  top:0;
  bottom:0;
  left:50%;
  width:0;
  pointer-events:none;
  z-index:4;
}

.divider::before{
  content:"";
  position:absolute;
  left:-1.5px;
  top:0;
  bottom:0;
  width:3px;
  background:#fff;
  box-shadow:0 0 10px rgba(0,0,0,.22);
}

.handle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:56px;
  height:56px;
  border-radius:50%;
  background:#fff;
  display:grid;
  place-items:center;
  font-size:22px;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  color:#111827;
  font-weight:700;
}

.label{
  position:absolute;
  top:12px;
  padding:6px 10px;
  background:rgba(0,0,0,.7);
  color:#fff;
  border-radius:20px;
  font-size:.8rem;
  z-index:5;
  pointer-events:none;
}

.label.before{ left:12px; }
.label.after{ right:12px; }

.content{
  padding:16px;
}

.project-title{
  font-weight:700;
  margin-bottom:10px;
  text-transform:capitalize;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#fff;
  text-decoration:none;
  font-weight:700;
  color:#111;
}

.btn.primary{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

/* Vista individual limpia */
body.single-mode{
  background:#fff;
}

body.single-mode .wrap{
  width:100%;
  max-width:100%;
  margin:0;
}

body.single-mode header,
body.single-mode .filters,
body.single-mode .status,
body.single-mode .content{
  display:none !important;
}

body.single-mode .category-title{
  display:none !important;
}

body.single-mode .category-block{
  margin:0;
}

body.single-mode .card{
  border:none;
  border-radius:0;
  box-shadow:none;
  overflow:hidden;
  background:transparent;
}

body.single-mode .viewer{
  width:100%;
  height:100vh;
  min-height:320px;
  max-height:100vh;
  aspect-ratio:auto;
  border-radius:0;
}

@media (max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }

  .handle{
    width:48px;
    height:48px;
  }

  body.single-mode .viewer{
    height:100svh;
  }
}
</style>
</head>

<body>
<div class="wrap">

<header>
  <h1 id="top">Comparativos Antes y Después</h1>
  <p class="sub">Portafolio visual organizado automáticamente por producto.</p>
</header>

<div id="status" class="status">Cargando proyectos...</div>
<div id="filters" class="filters"></div>
<main id="app"></main>

</div>

<script>
const USER = "MANTUA-DECORACION";
const REPO = "COMPARATIVO-ANTES-Y-DESPUES";
const BRANCH = "main";
const ROOT = "proyectos";

const statusEl = document.getElementById("status");
const filtersEl = document.getElementById("filters");
const app = document.getElementById("app");

function raw(path){
  return `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${path}`;
}

async function fetchDir(path){
  const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}?ref=${BRANCH}`);
  if(!res.ok) throw new Error("No se pudo leer " + path);
  return await res.json();
}

function prettify(text){
  return text.replace(/[-_]/g, " ").replace(/\b\w/g, l => l.toUpperCase());
}

function getProjectLink(cat, proj){
  return `${location.pathname}?cat=${encodeURIComponent(cat)}&proyecto=${encodeURIComponent(proj)}`;
}

function getEmbedLink(cat, proj){
  return `${location.pathname}?cat=${encodeURIComponent(cat)}&proyecto=${encodeURIComponent(proj)}&embed=1`;
}

function blockInteractionArtifacts(viewer){
  viewer.addEventListener("dragstart", e => e.preventDefault());
  viewer.addEventListener("selectstart", e => e.preventDefault());
  viewer.addEventListener("contextmenu", e => e.preventDefault());

  viewer.querySelectorAll("img").forEach(img => {
    img.setAttribute("draggable", "false");
    img.addEventListener("dragstart", e => e.preventDefault());
  });
}

function initCompare(viewer){
  const after = viewer.querySelector(".after-layer");
  const divider = viewer.querySelector(".divider");

  function set(percent){
    const safe = Math.max(0, Math.min(100, percent));
    after.style.clipPath = `inset(0 0 0 ${safe}%)`;
    divider.style.left = safe + "%";
  }

  function moveWithClientX(clientX){
    const rect = viewer.getBoundingClientRect();
    const x = clientX - rect.left;
    const percent = (x / rect.width) * 100;
    set(percent);
  }

  let dragging = false;

  viewer.addEventListener("pointerdown", e => {
    dragging = true;
    viewer.setPointerCapture(e.pointerId);
    moveWithClientX(e.clientX);
    e.preventDefault();
  });

  viewer.addEventListener("pointermove", e => {
    if(!dragging) return;
    moveWithClientX(e.clientX);
    e.preventDefault();
  });

  viewer.addEventListener("pointerup", e => {
    dragging = false;
    e.preventDefault();
  });

  viewer.addEventListener("pointercancel", () => {
    dragging = false;
  });

  viewer.addEventListener("mousedown", e => e.preventDefault());
  viewer.addEventListener("click", e => e.preventDefault());

  blockInteractionArtifacts(viewer);
  set(50);
}

function createCard(cat, proj, before, after, cleanMode = false){
  const card = document.createElement("div");
  card.className = "card";

  if(cleanMode){
    card.innerHTML = `
      <div class="viewer">
        <div class="before-layer"><img src="${before}" alt="Antes"></div>
        <div class="after-layer"><img src="${after}" alt="Después"></div>
        <div class="divider"><div class="handle">↔</div></div>
        <div class="label before">Antes</div>
        <div class="label after">Después</div>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="viewer">
        <div class="before-layer"><img src="${before}" alt="Antes de ${proj}"></div>
        <div class="after-layer"><img src="${after}" alt="Después de ${proj}"></div>
        <div class="divider"><div class="handle">↔</div></div>
        <div class="label before">Antes</div>
        <div class="label after">Después</div>
      </div>

      <div class="content">
        <div class="project-title">${prettify(proj)}</div>
        <div class="actions">
          <a class="btn primary" href="${getProjectLink(cat, proj)}">Ver comparativo</a>
          <a class="btn" href="${getEmbedLink(cat, proj)}" target="_blank">Link incrustar</a>
        </div>
      </div>
    `;
  }

  initCompare(card.querySelector(".viewer"));
  return card;
}

function renderFilters(categories){
  const valid = categories.filter(c => c.projects.length > 0);

  if(!valid.length){
    filtersEl.innerHTML = "";
    return;
  }

  filtersEl.innerHTML = `
    <a class="chip" href="#top">Todos</a>
    ${valid.map(c => `<a class="chip" href="#cat-${c.name}">${prettify(c.name)}</a>`).join("")}
  `;
}

async function getAllProjects(){
  const root = await fetchDir(ROOT);
  const cats = root.filter(item => item.type === "dir");
  const data = [];

  for(const c of cats){
    const projectFolders = await fetchDir(`${ROOT}/${c.name}`);
    const dirs = projectFolders.filter(item => item.type === "dir");

    const category = {
      name: c.name,
      projects: []
    };

    for(const p of dirs){
      const files = await fetchDir(`${ROOT}/${c.name}/${p.name}`);
      const imgs = files
        .filter(f => /\.(jpg|jpeg|png|webp|avif)$/i.test(f.name))
        .sort((a,b) => a.name.localeCompare(b.name, "es", { numeric:true, sensitivity:"base" }));

      if(imgs.length < 2) continue;

      category.projects.push({
        name: p.name,
        before: raw(imgs[0].path),
        after: raw(imgs[1].path)
      });
    }

    data.push(category);
  }

  return data;
}

async function load(){
  try{
    const params = new URLSearchParams(location.search);
    const cat = params.get("cat");
    const proj = params.get("proyecto");
    const embed = params.get("embed") === "1";

    const singleMode = Boolean(cat && proj);

    if(singleMode){
      document.body.classList.add("single-mode");
    }

    const categories = await getAllProjects();
    const total = categories.reduce((sum, c) => sum + c.projects.length, 0);

    if(!total){
      statusEl.className = "status error";
      statusEl.textContent = "No se encontraron proyectos válidos.";
      return;
    }

    if(cat && proj){
      const category = categories.find(c => c.name === cat);
      const project = category?.projects.find(p => p.name === proj);

      if(!project){
        statusEl.className = "status error";
        statusEl.textContent = "No se encontró el proyecto solicitado.";
        return;
      }

      const section = document.createElement("div");
      section.className = "category-block";

      section.appendChild(createCard(cat, proj, project.before, project.after, true));
      app.appendChild(section);

      if(embed || singleMode){
        statusEl.style.display = "none";
      } else {
        statusEl.className = "status ok";
        statusEl.textContent = "Comparativo cargado correctamente.";
      }

      return;
    }

    renderFilters(categories);

    for(const c of categories){
      if(!c.projects.length) continue;

      const section = document.createElement("div");
      section.className = "category-block";
      section.id = `cat-${c.name}`;

      const title = document.createElement("div");
      title.className = "category-title";
      title.textContent = prettify(c.name);

      const grid = document.createElement("div");
      grid.className = "grid";

      for(const p of c.projects){
        grid.appendChild(createCard(c.name, p.name, p.before, p.after, false));
      }

      section.appendChild(title);
      section.appendChild(grid);
      app.appendChild(section);
    }

    statusEl.className = "status ok";
    statusEl.textContent = "Proyectos cargados correctamente.";
  } catch(error){
    console.error(error);
    statusEl.className = "status error";
    statusEl.textContent = "Error al cargar los proyectos.";
  }
}

load();
</script>
</body>
</html>
