<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparativos Antes y Después | Mantua Decoración</title>

  <style>
    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#9f1239;
      --accent-soft:#fdf2f8;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(1280px, 92%);
      margin:0 auto;
    }

    header{
      padding:42px 0 20px;
      text-align:center;
    }

    h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 3rem);
      line-height:1.08;
    }

    .sub{
      margin:14px auto 0;
      color:var(--muted);
      font-size:1.06rem;
      max-width:780px;
      line-height:1.5;
    }

    .status{
      margin:24px auto 28px;
      padding:18px 20px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .status.error{
      background:#fef2f2;
      border-color:#fecaca;
      color:#991b1b;
    }

    .status.ok{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#166534;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
      margin:0 0 20px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:var(--accent);
      font-weight:700;
    }

    .filters{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:0 0 28px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      text-decoration:none;
      color:var(--text);
      font-weight:700;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
    }

    .category-block{
      margin:38px 0 54px;
      scroll-margin-top:24px;
    }

    .category-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .category-title{
      margin:0;
      font-size:1.75rem;
      text-transform:capitalize;
    }

    .category-badge{
      padding:8px 12px;
      background:var(--accent-soft);
      color:var(--accent);
      border-radius:999px;
      font-size:.95rem;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .viewer{
      position:relative;
      width:100%;
      aspect-ratio:16 / 10;
      overflow:hidden;
      background:#e5e7eb;
      user-select:none;
      touch-action:none;
      cursor:ew-resize;
    }

    .before-layer,
    .after-layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .viewer img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .after-layer{
      z-index:2;
      clip-path: inset(0 0 0 50%);
    }

    .divider{
      position:absolute;
      top:0;
      bottom:0;
      left:50%;
      width:0;
      pointer-events:none;
      z-index:4;
    }

    .divider::before{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      left:-1.5px;
      width:3px;
      background:#fff;
      box-shadow:0 0 10px rgba(0,0,0,.22);
    }

    .handle{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:56px;
      height:56px;
      border-radius:50%;
      background:#fff;
      display:grid;
      place-items:center;
      font-size:24px;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
      color:#111827;
      font-weight:700;
    }

    .label{
      position:absolute;
      top:14px;
      padding:8px 12px;
      border-radius:999px;
      font-size:.85rem;
      font-weight:700;
      background:rgba(17,24,39,.72);
      color:#fff;
      backdrop-filter:blur(6px);
      z-index:5;
    }

    .label.before{ left:14px; }
    .label.after{ right:14px; }

    .content{
      padding:18px;
    }

    .project-title{
      margin:0 0 8px;
      font-size:1.18rem;
      text-transform:capitalize;
    }

    .project-meta{
      margin:0 0 14px;
      color:var(--muted);
      font-size:.94rem;
      word-break:break-word;
      line-height:1.45;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
    }

    .btn.primary{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .single-view{
      max-width:1080px;
      margin:0 auto 50px;
    }

    .embed-wrap{
      width:100%;
      max-width:100%;
      margin:0;
      padding:0;
    }

    .embed-card{
      border:none;
      border-radius:0;
      box-shadow:none;
      background:transparent;
      overflow:hidden;
    }

    .embed-card .viewer{
      aspect-ratio:16 / 10;
      border-radius:0;
    }

    .empty{
      padding:28px 18px;
      border:1px dashed #d1d5db;
      border-radius:18px;
      color:var(--muted);
      background:#fff;
    }

    footer{
      padding:18px 0 50px;
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
    }

    body.embed-mode{
      background:transparent;
    }

    body.embed-mode .wrap{
      width:100%;
      max-width:100%;
      margin:0;
    }

    body.embed-mode header,
    body.embed-mode .status,
    body.embed-mode .topbar,
    body.embed-mode .filters,
    body.embed-mode footer,
    body.embed-mode .content{
      display:none !important;
    }

    body.embed-mode .single-view{
      max-width:100%;
      margin:0;
    }

    body.embed-mode .card{
      border:none;
      border-radius:0;
      box-shadow:none;
      overflow:hidden;
      background:transparent;
    }

    body.embed-mode .viewer{
      width:100%;
      aspect-ratio:16 / 10;
      border-radius:0;
    }

    @media (max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }

      .handle{
        width:48px;
        height:48px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="top">Comparativos Antes y Después</h1>
      <p class="sub">
        Portafolio visual organizado automáticamente por producto y proyecto.
      </p>
    </header>

    <div id="status" class="status">Cargando proyectos...</div>
    <div id="topbar" class="topbar" style="display:none;"></div>
    <div id="filters" class="filters" style="display:none;"></div>
    <main id="app"></main>

    <footer>
      Mantua Decoración · Comparativos automáticos
    </footer>
  </div>

  <script>
    const GITHUB_USER = "MANTUA-DECORACION";
    const GITHUB_REPO = "COMPARATIVO-ANTES-Y-DESPUES";
    const GITHUB_BRANCH = "main";
    const ROOT_FOLDER = "proyectos";

    const statusEl = document.getElementById("status");
    const topbarEl = document.getElementById("topbar");
    const filtersEl = document.getElementById("filters");
    const app = document.getElementById("app");

    function setStatus(message, type = "") {
      statusEl.className = "status" + (type ? " " + type : "");
      statusEl.innerHTML = message;
    }

    function prettifyName(name) {
      return name
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function isImage(fileName) {
      return /\.(jpg|jpeg|png|webp|avif)$/i.test(fileName);
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`;
    }

    async function fetchContents(path) {
      const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`No se pudo leer: ${path}`);
      return await res.json();
    }

    function getProjectLink(category, project) {
      const url = new URL(window.location.href);
      url.searchParams.set("cat", category);
      url.searchParams.set("proyecto", project);
      url.searchParams.delete("embed");
      return url.toString();
    }

    function getEmbedLink(category, project) {
      const url = new URL(window.location.href);
      url.searchParams.set("cat", category);
      url.searchParams.set("proyecto", project);
      url.searchParams.set("embed", "1");
      return url.toString();
    }

    function initTouchCompare(viewer, initialPercent = 50) {
      const afterLayer = viewer.querySelector(".after-layer");
      const divider = viewer.querySelector(".divider");

      function setPercent(percent) {
        const safe = Math.max(0, Math.min(100, percent));
        afterLayer.style.clipPath = `inset(0 0 0 ${safe}%)`;
        divider.style.left = safe + "%";
      }

      function updateFromClientX(clientX) {
        const rect = viewer.getBoundingClientRect();
        const x = clientX - rect.left;
        const percent = (x / rect.width) * 100;
        setPercent(percent);
      }

      let dragging = false;

      viewer.addEventListener("pointerdown", (e) => {
        dragging = true;
        updateFromClientX(e.clientX);
        viewer.setPointerCapture(e.pointerId);
      });

      viewer.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        updateFromClientX(e.clientX);
      });

      viewer.addEventListener("pointerup", () => {
        dragging = false;
      });

      viewer.addEventListener("pointercancel", () => {
        dragging = false;
      });

      setPercent(initialPercent);
    }

    function createCard(categoryName, projectName, beforeSrc, afterSrc, projectPath, options = {}) {
      const { single = false, embed = false } = options;
      const card = document.createElement("article");
      card.className = embed ? "card embed-card" : "card";

      const projectLink = getProjectLink(categoryName, projectName);
      const embedLink = getEmbedLink(categoryName, projectName);

      if (embed) {
        card.innerHTML = `
          <div class="viewer">
            <div class="before-layer">
              <img src="${beforeSrc}" alt="Antes de ${projectName}" loading="lazy">
            </div>

            <div class="after-layer">
              <img src="${afterSrc}" alt="Después de ${projectName}" loading="lazy">
            </div>

            <div class="divider">
              <div class="handle">↔</div>
            </div>

            <div class="label before">Antes</div>
            <div class="label after">Después</div>
          </div>
        `;
      } else {
        card.innerHTML = `
          <div class="viewer">
            <div class="before-layer">
              <img src="${beforeSrc}" alt="Antes de ${projectName}" loading="lazy">
            </div>

            <div class="after-layer">
              <img src="${afterSrc}" alt="Después de ${projectName}" loading="lazy">
            </div>

            <div class="divider">
              <div class="handle">↔</div>
            </div>

            <div class="label before">Antes</div>
            <div class="label after">Después</div>
          </div>

          <div class="content">
            <h3 class="project-title">${prettifyName(projectName)}</h3>
            <p class="project-meta">${prettifyName(categoryName)} · ${projectPath}</p>

            <div class="actions">
              ${
                single
                  ? `<a class="btn primary" href="${window.location.pathname}">← Volver al portafolio</a>`
                  : `<a class="btn primary" href="${projectLink}">Ver comparativo</a>`
              }
              <a class="btn" href="${embedLink}" target="_blank">Link incrustar</a>
              <a class="btn" href="${beforeSrc}" target="_blank">Link imagen 1</a>
              <a class="btn" href="${afterSrc}" target="_blank">Link imagen 2</a>
            </div>
          </div>
        `;
      }

      initTouchCompare(card.querySelector(".viewer"), 50);
      return card;
    }

    async function getAllProjects() {
      const rootItems = await fetchContents(ROOT_FOLDER);
      const categories = rootItems.filter(item => item.type === "dir");

      const data = [];

      for (const category of categories) {
        const categoryPath = `${ROOT_FOLDER}/${category.name}`;
        const categoryItems = await fetchContents(categoryPath);
        const projectFolders = categoryItems.filter(item => item.type === "dir");

        const categoryData = {
          name: category.name,
          projects: []
        };

        for (const project of projectFolders) {
          const projectPath = `${categoryPath}/${project.name}`;
          const files = await fetchContents(projectPath);

          const imageFiles = files
            .filter(file => file.type === "file" && isImage(file.name))
            .sort((a, b) => a.name.localeCompare(b.name, "es", { numeric: true, sensitivity: "base" }));

          if (imageFiles.length < 2) continue;

          categoryData.projects.push({
            name: project.name,
            path: `${category.name}/${project.name}`,
            beforeSrc: rawUrl(imageFiles[0].path),
            afterSrc: rawUrl(imageFiles[1].path)
          });
        }

        data.push(categoryData);
      }

      return data;
    }

    function renderFilters(categories) {
      const validCategories = categories.filter(c => c.projects.length > 0);

      if (!validCategories.length) {
        filtersEl.style.display = "none";
        filtersEl.innerHTML = "";
        return;
      }

      filtersEl.style.display = "flex";
      filtersEl.innerHTML = `
        <a class="chip" href="#top">Todos</a>
        ${validCategories.map(c => `
          <a class="chip" href="#cat-${c.name}">${prettifyName(c.name)}</a>
        `).join("")}
      `;
    }

    function renderTopbarSingle(category, project) {
      topbarEl.style.display = "flex";
      topbarEl.innerHTML = `
        <a class="back-link" href="${window.location.pathname}">← Volver al portafolio</a>
        <div>${prettifyName(category)} / ${prettifyName(project)}</div>
      `;
    }

    async function loadProjects() {
      try {
        app.innerHTML = "";
        topbarEl.style.display = "none";
        topbarEl.innerHTML = "";
        filtersEl.style.display = "none";
        filtersEl.innerHTML = "";

        const params = new URLSearchParams(window.location.search);
        const selectedCategory = params.get("cat");
        const selectedProject = params.get("proyecto");
        const embedMode = params.get("embed") === "1";

        if (embedMode) {
          document.body.classList.add("embed-mode");
        }

        setStatus("Cargando categorías y proyectos...");

        const categories = await getAllProjects();
        const totalProjects = categories.reduce((sum, c) => sum + c.projects.length, 0);

        if (!categories.length || totalProjects === 0) {
          setStatus(
            `No se encontraron proyectos válidos. Cada carpeta interna debe tener al menos <strong>2 imágenes</strong>.`,
            "error"
          );
          return;
        }

        if (selectedCategory && selectedProject) {
          const category = categories.find(c => c.name === selectedCategory);
          const project = category?.projects.find(p => p.name === selectedProject);

          if (!category || !project) {
            setStatus("No se encontró el proyecto solicitado.", "error");
            return;
          }

          if (embedMode) {
            const wrap = document.createElement("section");
            wrap.className = "embed-wrap";

            wrap.appendChild(
              createCard(
                category.name,
                project.name,
                project.beforeSrc,
                project.afterSrc,
                project.path,
                { embed: true }
              )
            );

            app.appendChild(wrap);
            return;
          }

          renderTopbarSingle(category.name, project.name);

          const wrap = document.createElement("section");
          wrap.className = "single-view";

          wrap.appendChild(
            createCard(
              category.name,
              project.name,
              project.beforeSrc,
              project.afterSrc,
              project.path,
              { single: true }
            )
          );

          app.appendChild(wrap);
          setStatus("Link individual cargado correctamente.", "ok");
          return;
        }

        renderFilters(categories);

        let shownCategories = 0;

        for (const category of categories) {
          const section = document.createElement("section");
          section.className = "category-block";
          section.id = `cat-${category.name}`;

          const head = document.createElement("div");
          head.className = "category-head";

          const title = document.createElement("h2");
          title.className = "category-title";
          title.textContent = prettifyName(category.name);

          const badge = document.createElement("div");
          badge.className = "category-badge";
          badge.textContent = `${category.projects.length} proyecto${category.projects.length === 1 ? "" : "s"}`;

          head.appendChild(title);
          head.appendChild(badge);
          section.appendChild(head);

          if (!category.projects.length) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "No se encontraron proyectos válidos en esta categoría.";
            section.appendChild(empty);
          } else {
            const grid = document.createElement("div");
            grid.className = "grid";

            for (const project of category.projects) {
              grid.appendChild(
                createCard(
                  category.name,
                  project.name,
                  project.beforeSrc,
                  project.afterSrc,
                  project.path
                )
              );
            }

            section.appendChild(grid);
            shownCategories++;
          }

          app.appendChild(section);
        }

        setStatus(
          `Se cargaron correctamente <strong>${totalProjects}</strong> proyecto(s) en <strong>${shownCategories}</strong> categoría(s).`,
          "ok"
        );
      } catch (error) {
        console.error(error);
        setStatus(
          `Error al cargar los proyectos.<br>
          Revisa que exista la carpeta <strong>${ROOT_FOLDER}</strong>, que el repositorio sea público y que GitHub Pages esté activo.`,
          "error"
        );
      }
    }

    loadProjects();
  </script>
</body>
</html>
