<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparativos Antes y Después | Mantua Decoración</title>

<style>

:root{
--bg:#f7f7f8;
--card:#ffffff;
--text:#1f2937;
--muted:#6b7280;
--line:#e5e7eb;
--accent:#9f1239;
--accent-soft:#fdf2f8;
--shadow:0 10px 30px rgba(0,0,0,.08);
--radius:22px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

.wrap{
width:min(1280px,92%);
margin:auto;
}

header{
text-align:center;
padding:40px 0 20px;
}

h1{
margin:0;
font-size:clamp(2rem,4vw,3rem);
}

.sub{
color:var(--muted);
margin-top:10px;
}

.status{
margin:20px 0;
padding:16px;
border-radius:14px;
background:#fff;
border:1px solid var(--line);
}

.status.ok{
background:#f0fdf4;
border-color:#bbf7d0;
color:#166534;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.chip{
padding:8px 14px;
border-radius:999px;
border:1px solid var(--line);
background:#fff;
text-decoration:none;
font-weight:700;
color:var(--text);
}

.category-block{
margin:40px 0;
}

.category-title{
font-size:1.6rem;
margin-bottom:15px;
text-transform:capitalize;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
gap:22px;
}

.card{
background:#fff;
border:1px solid var(--line);
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
}

.viewer{
position:relative;
width:100%;
aspect-ratio:16/10;
overflow:hidden;
cursor:ew-resize;
touch-action:none;
}

.before-layer,
.after-layer{
position:absolute;
inset:0;
}

.viewer img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.after-layer{
clip-path:inset(0 0 0 50%);
}

.divider{
position:absolute;
top:0;
bottom:0;
left:50%;
width:0;
pointer-events:none;
}

.divider::before{
content:"";
position:absolute;
left:-1.5px;
top:0;
bottom:0;
width:3px;
background:#fff;
}

.handle{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:56px;
height:56px;
border-radius:50%;
background:#fff;
display:grid;
place-items:center;
font-size:22px;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.label{
position:absolute;
top:12px;
padding:6px 10px;
background:rgba(0,0,0,.7);
color:#fff;
border-radius:20px;
font-size:.8rem;
}

.label.before{left:12px}
.label.after{right:12px}

.content{
padding:16px;
}

.project-title{
font-weight:700;
margin-bottom:10px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 14px;
border-radius:10px;
border:1px solid var(--line);
background:#fff;
text-decoration:none;
font-weight:700;
color:#111;
}

.btn.primary{
background:var(--accent);
color:#fff;
border-color:var(--accent);
}

body.embed-mode header,
body.embed-mode .filters,
body.embed-mode .status,
body.embed-mode footer,
body.embed-mode .content{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<header>
<h1>Comparativos Antes y Después</h1>
<p class="sub">Portafolio visual organizado automáticamente por producto.</p>
</header>

<div id="status" class="status">Cargando proyectos...</div>
<div id="filters" class="filters"></div>
<main id="app"></main>

</div>

<script>

const USER="MANTUA-DECORACION"
const REPO="COMPARATIVO-ANTES-Y-DESPUES"
const BRANCH="main"
const ROOT="proyectos"

const statusEl=document.getElementById("status")
const filtersEl=document.getElementById("filters")
const app=document.getElementById("app")

function raw(path){
return`https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${path}`
}

function fetchDir(path){
return fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}?ref=${BRANCH}`).then(r=>r.json())
}

function prettify(t){
return t.replace(/[-_]/g," ").replace(/\b\w/g,l=>l.toUpperCase())
}

function getProjectLink(cat,proj){
return`${location.pathname}?cat=${cat}&proyecto=${proj}`
}

function getEmbedLink(cat,proj){
return`${location.pathname}?cat=${cat}&proyecto=${proj}&embed=1`
}

function initCompare(viewer){

const after=viewer.querySelector(".after-layer")
const divider=viewer.querySelector(".divider")

function set(p){
p=Math.max(0,Math.min(100,p))
after.style.clipPath=`inset(0 0 0 ${p}%)`
divider.style.left=p+"%"
}

viewer.addEventListener("pointerdown",e=>{
viewer.setPointerCapture(e.pointerId)
move(e)
})

viewer.addEventListener("pointermove",e=>{
if(e.buttons) move(e)
})

function move(e){
const rect=viewer.getBoundingClientRect()
const x=e.clientX-rect.left
set(x/rect.width*100)
}

set(50)

}

function createCard(cat,proj,before,after,embed=false){

const card=document.createElement("div")
card.className="card"

if(embed){
card.innerHTML=`
<div class="viewer">
<div class="before-layer"><img src="${before}"></div>
<div class="after-layer"><img src="${after}"></div>
<div class="divider"><div class="handle">↔</div></div>
<div class="label before">Antes</div>
<div class="label after">Después</div>
</div>
`
}else{
card.innerHTML=`
<div class="viewer">
<div class="before-layer"><img src="${before}"></div>
<div class="after-layer"><img src="${after}"></div>
<div class="divider"><div class="handle">↔</div></div>
<div class="label before">Antes</div>
<div class="label after">Después</div>
</div>

<div class="content">
<div class="project-title">${prettify(proj)}</div>
<div class="actions">
<a class="btn primary" href="${getProjectLink(cat,proj)}">Ver comparativo</a>
<a class="btn" href="${getEmbedLink(cat,proj)}">Link incrustar</a>
</div>
</div>
`
}

initCompare(card.querySelector(".viewer"))
return card

}

async function load(){

const params=new URLSearchParams(location.search)
const cat=params.get("cat")
const proj=params.get("proyecto")
const embed=params.get("embed")

if(embed) document.body.classList.add("embed-mode")

const root=await fetchDir(ROOT)

const cats=root.filter(i=>i.type==="dir")

if(cat && proj){

const files=await fetchDir(`${ROOT}/${cat}/${proj}`)

const imgs=files.filter(f=>/\.(jpg|png|jpeg|webp)/i.test(f.name)).sort((a,b)=>a.name.localeCompare(b.name))

const before=raw(imgs[0].path)
const after=raw(imgs[1].path)

const card=createCard(cat,proj,before,after,true)
app.appendChild(card)

statusEl.style.display="none"

return
}

for(const c of cats){

const section=document.createElement("div")
section.className="category-block"

const title=document.createElement("div")
title.className="category-title"
title.textContent=prettify(c.name)

section.appendChild(title)

const grid=document.createElement("div")
grid.className="grid"

const projects=await fetchDir(`${ROOT}/${c.name}`)

for(const p of projects.filter(i=>i.type==="dir")){

const files=await fetchDir(`${ROOT}/${c.name}/${p.name}`)

const imgs=files.filter(f=>/\.(jpg|png|jpeg|webp)/i.test(f.name)).sort((a,b)=>a.name.localeCompare(b.name))

if(imgs.length<2) continue

const before=raw(imgs[0].path)
const after=raw(imgs[1].path)

grid.appendChild(createCard(c.name,p.name,before,after))

}

section.appendChild(grid)
app.appendChild(section)

}

statusEl.textContent="Proyectos cargados correctamente."

}

load()

</script>

</body>
</html>
