<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparativos Antes y Después | Mantua Decoración</title>
  <style>
    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#9f1239;
      --accent-soft:#fdf2f8;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(1200px, 92%);
      margin:0 auto;
    }

    header{
      padding:48px 0 24px;
      text-align:center;
    }

    h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 3rem);
      line-height:1.1;
    }

    .sub{
      margin:14px auto 0;
      color:var(--muted);
      font-size:1.1rem;
      max-width:760px;
    }

    .status{
      margin:28px auto 36px;
      padding:18px 20px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    .status.error{
      background:#fef2f2;
      border-color:#fecaca;
      color:#991b1b;
    }

    .status.ok{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#166534;
    }

    .category-block{
      margin:42px 0 52px;
    }

    .category-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .category-title{
      margin:0;
      font-size:1.7rem;
      text-transform:capitalize;
    }

    .category-badge{
      padding:8px 12px;
      background:var(--accent-soft);
      color:var(--accent);
      border-radius:999px;
      font-size:.95rem;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .viewer{
      position:relative;
      width:100%;
      aspect-ratio: 4 / 3;
      overflow:hidden;
      background:#e5e7eb;
      user-select:none;
    }

    .viewer img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
    }

    .after-wrap{
      position:absolute;
      inset:0;
      width:50%;
      overflow:hidden;
      border-right:3px solid #fff;
      box-shadow:2px 0 8px rgba(0,0,0,.15);
    }

    .after-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .divider{
      position:absolute;
      top:0;
      bottom:0;
      left:50%;
      width:0;
      pointer-events:none;
    }

    .divider::before{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      left:-1.5px;
      width:3px;
      background:#fff;
      box-shadow:0 0 10px rgba(0,0,0,.2);
    }

    .divider::after{
      content:"↔";
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:44px;
      height:44px;
      border-radius:50%;
      background:#fff;
      color:#111827;
      display:grid;
      place-items:center;
      font-size:20px;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
      font-weight:700;
    }

    .label{
      position:absolute;
      top:14px;
      padding:8px 12px;
      border-radius:999px;
      font-size:.85rem;
      font-weight:700;
      background:rgba(17,24,39,.72);
      color:#fff;
      backdrop-filter:blur(6px);
      z-index:3;
    }

    .label.before{ left:14px; }
    .label.after{ right:14px; }

    .slider{
      width:calc(100% - 28px);
      margin:14px;
      accent-color:var(--accent);
    }

    .content{
      padding:0 18px 18px;
    }

    .project-title{
      margin:4px 0 8px;
      font-size:1.15rem;
      text-transform:capitalize;
    }

    .project-path{
      margin:0;
      color:var(--muted);
      font-size:.93rem;
      word-break:break-word;
    }

    .empty{
      padding:30px 18px;
      border:1px dashed #d1d5db;
      border-radius:18px;
      color:var(--muted);
      background:#fff;
    }

    footer{
      padding:30px 0 50px;
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
    }

    .tips{
      margin:10px 0 0;
      font-size:.92rem;
      color:var(--muted);
    }

    @media (max-width:640px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Comparativos Antes y Después</h1>
      <p class="sub">
        Proyectos reales organizados automáticamente por categoría y carpeta.
      </p>
    </header>

    <div id="status" class="status">Cargando proyectos...</div>

    <main id="app"></main>

    <footer>
      Mantua Decoración · Comparativos visuales automáticos
      <div class="tips">
        Solo crea carpetas dentro de <strong>proyectos</strong> y sube imágenes llamadas
        <strong>antes</strong> y <strong>despues</strong>.
      </div>
    </footer>
  </div>

  <script>
    // ========= CONFIGURACIÓN FIJA =========
    // Solo cambia esto UNA VEZ si cambias de repositorio.
    const GITHUB_USER = "MANTUA-DECORACION";
    const GITHUB_REPO = "COMPARATIVO-ANTES-Y-DESPUES";
    const GITHUB_BRANCH = "main";
    const ROOT_FOLDER = "proyectos";

    // ========= UTILIDADES =========
    const statusEl = document.getElementById("status");
    const app = document.getElementById("app");

    function setStatus(message, type = "") {
      statusEl.className = "status" + (type ? " " + type : "");
      statusEl.innerHTML = message;
    }

    function prettifyName(name) {
      return name
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function isImage(fileName) {
      return /\.(jpg|jpeg|png|webp|avif)$/i.test(fileName);
    }

    function isBeforeImage(fileName) {
      return /^antes(\.[a-z0-9]+)$/i.test(fileName);
    }

    function isAfterImage(fileName) {
      return /^despues(\.[a-z0-9]+)$/i.test(fileName);
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`;
    }

    async function fetchContents(path) {
      const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`;
      const res = await fetch(url);

      if (!res.ok) {
        throw new Error(`No se pudo leer la ruta: ${path}`);
      }

      return await res.json();
    }

    function createCard(categoryName, projectName, beforeSrc, afterSrc, projectPath) {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="viewer">
          <img src="${beforeSrc}" alt="Antes de ${projectName}" loading="lazy">
          <div class="after-wrap">
            <img src="${afterSrc}" alt="Después de ${projectName}" loading="lazy">
          </div>
          <div class="divider"></div>
          <div class="label before">Antes</div>
          <div class="label after">Después</div>
        </div>

        <input class="slider" type="range" min="0" max="100" value="50" aria-label="Comparador antes y después">

        <div class="content">
          <h3 class="project-title">${prettifyName(projectName)}</h3>
          <p class="project-path">${prettifyName(categoryName)} · ${projectPath}</p>
        </div>
      `;

      const slider = card.querySelector(".slider");
      const afterWrap = card.querySelector(".after-wrap");
      const divider = card.querySelector(".divider");

      function updateSlider(value) {
        afterWrap.style.width = value + "%";
        divider.style.left = value + "%";
      }

      slider.addEventListener("input", e => updateSlider(e.target.value));
      updateSlider(50);

      return card;
    }

    async function loadProjects() {
      try {
        setStatus("Cargando categorías y proyectos...");
        app.innerHTML = "";

        // 1) Leer categorías dentro de /proyectos
        const rootItems = await fetchContents(ROOT_FOLDER);
        const categories = rootItems.filter(item => item.type === "dir");

        if (!categories.length) {
          setStatus(
            `No se encontraron categorías dentro de <strong>${ROOT_FOLDER}</strong>.`,
            "error"
          );
          return;
        }

        let totalProjects = 0;
        let totalCategories = 0;

        for (const category of categories) {
          const categoryPath = `${ROOT_FOLDER}/${category.name}`;
          const categoryItems = await fetchContents(categoryPath);
          const projectFolders = categoryItems.filter(item => item.type === "dir");

          const section = document.createElement("section");
          section.className = "category-block";

          const head = document.createElement("div");
          head.className = "category-head";

          const title = document.createElement("h2");
          title.className = "category-title";
          title.textContent = prettifyName(category.name);

          const badge = document.createElement("div");
          badge.className = "category-badge";
          badge.textContent = `${projectFolders.length} proyecto${projectFolders.length === 1 ? "" : "s"}`;

          head.appendChild(title);
          head.appendChild(badge);
          section.appendChild(head);

          const grid = document.createElement("div");
          grid.className = "grid";

          let validProjectsInCategory = 0;

          for (const project of projectFolders) {
            const projectPath = `${categoryPath}/${project.name}`;
            const files = await fetchContents(projectPath);
            const imageFiles = files.filter(file => file.type === "file" && isImage(file.name));

            const beforeFile = imageFiles.find(file => isBeforeImage(file.name));
            const afterFile = imageFiles.find(file => isAfterImage(file.name));

            if (!beforeFile || !afterFile) {
              continue;
            }

            const beforeSrc = rawUrl(beforeFile.path);
            const afterSrc = rawUrl(afterFile.path);

            const card = createCard(
              category.name,
              project.name,
              beforeSrc,
              afterSrc,
              `${category.name}/${project.name}`
            );

            grid.appendChild(card);
            validProjectsInCategory++;
            totalProjects++;
          }

          if (validProjectsInCategory === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.innerHTML = `
              No se encontraron proyectos válidos en esta categoría.<br>
              Recuerda subir dentro de cada carpeta un <strong>antes</strong> y un <strong>despues</strong>.
            `;
            section.appendChild(empty);
          } else {
            section.appendChild(grid);
          }

          app.appendChild(section);
          totalCategories++;
        }

        if (totalProjects === 0) {
          setStatus(
            `Se encontraron carpetas, pero ningún proyecto válido. Verifica que cada carpeta tenga imágenes llamadas <strong>antes</strong> y <strong>despues</strong>.`,
            "error"
          );
          return;
        }

        setStatus(
          `Se cargaron correctamente <strong>${totalProjects}</strong> proyecto(s) en <strong>${totalCategories}</strong> categoría(s).`,
          "ok"
        );

      } catch (error) {
        console.error(error);
        setStatus(
          `Error al cargar los proyectos.<br>
          Revisa que exista la carpeta <strong>${ROOT_FOLDER}</strong>, que el repositorio sea <strong>público</strong> y que GitHub Pages esté activo.`,
          "error"
        );
      }
    }

    loadProjects();
  </script>
</body>
</html>
